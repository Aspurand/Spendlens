<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>SpendLens · Woody</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet"/>
<style>
  :root {
    --bg: #FFF9F5;
    --surface: #FFFFFF;
    --surface-2: #F5F2F0;
    --fg-primary: #231F20;
    --fg-secondary: #57504E;
    --fg-muted: #8A827F;
    --border: #E9E3DF;
    --border-strong: #BDB8B6;
    --accent: #C49A6C;
    --btn-primary: #231F20;
    --btn-primary-fg: #FFF9F5;
    --positive: #2D7D6F;
    --critical: #9B2C5E;
    --positive-soft-bg: #E6F5F2;
    --critical-soft-bg: #FAE8F0;
  }
  [data-dark="true"] {
    --bg: #1A1A1A;
    --surface: #1F1F1F;
    --surface-2: #181818;
    --fg-primary: #F5F2F0;
    --fg-secondary: #BDB8B6;
    --fg-muted: #8A827F;
    --border: #2A2A2A;
    --border-strong: #3D3D3D;
    --btn-primary: #F5F2F0;
    --btn-primary-fg: #1A1A1A;
    --positive: #4BC2A8;
    --critical: #F06292;
    --positive-soft-bg: rgba(75,194,168,0.18);
    --critical-soft-bg: rgba(240,98,146,0.18);
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--fg-primary);
    background: #E5E0DB;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(196,154,108,0.12), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(102,84,163,0.08), transparent 55%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  [data-dark="true"] body, body[data-dark-page="true"] {
    background: #0E0E0E;
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .page-scroll { scrollbar-width: none; }
  .page-scroll::-webkit-scrollbar { display: none; }
  button { font-family: inherit; }
  .mat { font-family: 'Material Symbols Rounded'; font-weight: 500; font-style: normal; letter-spacing: normal; font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased; display:inline-block; line-height:1; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="dashboards.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": true,
  "accent": "#C49A6C",
  "variant": "bold",
  "density": "comfortable",
  "showHero": true
}/*EDITMODE-END*/;

function loadTweaks(){
  try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('sl_tweaks')||'{}') }; }
  catch(e){ return { ...TWEAK_DEFAULTS }; }
}

const NAV = [
  { id:'home',     label:'Home',     icon:'home' },
  { id:'finance',  label:'Finance',  icon:'account_balance_wallet' },
  { id:'calendar', label:'Cash Flow',icon:'calendar_month' },
  { id:'budget',   label:'Budget',   icon:'donut_small' },
  { id:'more',     label:'More',     icon:'apps' },
];

const MORE_ITEMS = [
  { id:'invest',    label:'Investments',   icon:'trending_up',  desc:'$87,200 · +1.49% today' },
  { id:'goals',     label:'Savings Goals', icon:'flag',         desc:'3 active · $32,850 saved' },
  { id:'debt',      label:'Debt Payoff',   icon:'credit_card_off',desc:'$8,890 across 4 cards' },
  { id:'payments',  label:'Payments',      icon:'payments',     desc:'Card payments log' },
  { id:'optimizer', label:'Card Optimizer',icon:'auto_awesome', desc:'+$184 potential this month' },
  { id:'settings',  label:'Settings',      icon:'settings',     desc:'Theme, sync, data' },
];

function NavBar({ current, onNav, dark }){
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      paddingBottom: 24, paddingTop: 10,
      background: dark ? 'rgba(26,26,26,0.88)' : 'rgba(255,249,245,0.88)',
      backdropFilter:'blur(20px) saturate(180%)',
      WebkitBackdropFilter:'blur(20px) saturate(180%)',
      borderTop: `1px solid ${dark?'#2A2A2A':'#E9E3DF'}`,
      display:'flex', justifyContent:'space-around',
      zIndex:10,
    }}>
      {NAV.map(n=>{
        const active = n.id===current || (n.id==='more' && MORE_ITEMS.some(m=>m.id===current));
        return (
          <button key={n.id} onClick={()=>onNav(n.id)} style={{
            background:'transparent', border:0, cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            padding:'6px 12px', minHeight:44,
            color: active ? 'var(--fg-primary)' : 'var(--fg-muted)',
          }}>
            <span className="mat" style={{ fontSize:22, fontVariationSettings:`'FILL' ${active?1:0}` }}>{n.icon}</span>
            <span style={{ fontSize:10, fontWeight:700, letterSpacing:'0.02em' }}>{n.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function TopBar({ title, dark, accent, onMenu }){
  return (
    <div style={{
      padding:'72px 20px 14px', display:'flex', alignItems:'center', justifyContent:'space-between',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{
          width:34, height:34, borderRadius:8,
          background:'#231F20', color:'#FFF9F5',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontFamily:"'Inter', system-ui", fontWeight:700, fontSize:18, letterSpacing:'-0.02em',
          position:'relative', overflow:'hidden',
        }}>
          <span style={{ position:'relative', zIndex:1 }}>$</span>
          <div style={{ position:'absolute', bottom:0, left:0, right:0, height:3, background:accent }}/>
        </div>
        <div>
          <div style={{ fontFamily:"'Inter', system-ui", fontWeight:700, fontSize:16, letterSpacing:'-0.01em', lineHeight:1 }}>SpendLens</div>
          <div style={{ fontSize:9, color:'var(--fg-muted)', fontFamily:"'Azeret Mono', monospace", letterSpacing:'0.08em', textTransform:'uppercase', marginTop:3 }}>{title}</div>
        </div>
      </div>
      <div style={{ display:'flex', gap:6 }}>
        <button style={navIconBtn(dark)}>
          <span className="mat" style={{ fontSize:19 }}>search</span>
        </button>
        <button style={navIconBtn(dark)} onClick={onMenu}>
          <span className="mat" style={{ fontSize:19 }}>notifications</span>
        </button>
      </div>
    </div>
  );
}

const navIconBtn = dark => ({
  width:36, height:36, borderRadius:'50%',
  background: dark?'#1F1F1F':'#FFFFFF',
  border:`1px solid ${dark?'#2A2A2A':'#E9E3DF'}`,
  color:'var(--fg-primary)',
  display:'flex', alignItems:'center', justifyContent:'center',
  cursor:'pointer',
});

function MoreMenu({ onNav, dark }){
  return (
    <>
      <PageHeader title="More" eyebrow="ADDITIONAL"/>
      <div style={{ padding:'0 16px 24px' }}>
        {MORE_ITEMS.map(m=>(
          <Card key={m.id} dark={dark} onClick={()=>onNav(m.id)} style={{
            padding:14, marginBottom:8, display:'flex', alignItems:'center', gap:12, cursor:'pointer',
          }}>
            <div style={{ width:40, height:40, borderRadius:10, background:dark?'#181818':'#F5F2F0', display:'flex', alignItems:'center', justifyContent:'center' }}>
              <span className="mat" style={{ fontSize:22 }}>{m.icon}</span>
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:14, fontWeight:700 }} onClick={()=>onNav(m.id)}>{m.label}</div>
              <div style={{ fontSize:11, color:'var(--fg-secondary)', marginTop:2 }}>{m.desc}</div>
            </div>
            <span className="mat" style={{ fontSize:20, color:'var(--fg-muted)' }}>chevron_right</span>
          </Card>
        ))}
      </div>
    </>
  );
}

function HomeDashboard({ variant, dark, accent, showHero, density }){
  switch(variant){
    case 'ledger': return <DashboardLedger dark={dark} accent={accent} showHero={showHero} density={density}/>;
    case 'bold':   return <DashboardBold dark={dark} accent={accent} showHero={showHero} density={density}/>;
    default:       return <DashboardEditorial dark={dark} accent={accent} showHero={showHero} density={density}/>;
  }
}

function TweaksPanel({ tweaks, setTweak, onClose }){
  const accents = [
    {v:'#C49A6C', label:'Gold'},
    {v:'#9B2C5E', label:'Raspberry'},
    {v:'#2D7D6F', label:'Teal'},
    {v:'#6654A3', label:'Amethyst'},
  ];
  const variants = [
    {v:'editorial', label:'Editorial'},
    {v:'ledger',    label:'Ledger'},
    {v:'bold',      label:'Bold'},
  ];
  return (
    <div style={{
      position:'fixed', bottom:16, right:16, width:260,
      background:'#FFFFFF', color:'#231F20',
      borderRadius:10, border:'1px solid #E9E3DF',
      boxShadow:'0 12px 40px rgba(0,0,0,0.18)',
      zIndex:100, overflow:'hidden',
      fontFamily:"'Inter', system-ui",
    }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 14px', background:'#231F20', color:'#FFF9F5' }}>
        <div>
          <div style={{ fontSize:9, letterSpacing:'0.14em', fontFamily:"'Azeret Mono', monospace", opacity:0.65, textTransform:'uppercase' }}>SpendLens</div>
          <div style={{ fontSize:14, fontWeight:700, marginTop:1 }}>Tweaks</div>
        </div>
        <button onClick={onClose} style={{ border:0, background:'transparent', color:'#FFF9F5', cursor:'pointer', padding:4 }}>
          <span className="mat" style={{ fontSize:18 }}>close</span>
        </button>
      </div>
      <div style={{ padding:14 }}>
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:9, letterSpacing:'0.12em', fontWeight:700, fontFamily:"'Azeret Mono', monospace", textTransform:'uppercase', color:'#8A827F', marginBottom:6 }}>Mode</div>
          <div style={{ display:'flex', gap:6 }}>
            {[['Light',false],['Dark',true]].map(([l,v])=>(
              <button key={l} onClick={()=>setTweak('dark',v)} style={{
                flex:1, height:32, borderRadius:6, cursor:'pointer',
                background: tweaks.dark===v ? '#231F20':'#FFF', color: tweaks.dark===v?'#FFF9F5':'#231F20',
                border:'1px solid #231F20', fontWeight:600, fontSize:12,
              }}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:9, letterSpacing:'0.12em', fontWeight:700, fontFamily:"'Azeret Mono', monospace", textTransform:'uppercase', color:'#8A827F', marginBottom:6 }}>Accent</div>
          <div style={{ display:'flex', gap:6 }}>
            {accents.map(a=>(
              <button key={a.v} onClick={()=>setTweak('accent',a.v)} title={a.label} style={{
                flex:1, height:30, borderRadius:6, cursor:'pointer',
                background: a.v, border: tweaks.accent===a.v?'2px solid #231F20':'2px solid transparent',
                boxShadow: tweaks.accent===a.v?'0 0 0 2px #FFF, 0 0 0 3px #231F20 inset':'none',
              }}/>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:9, letterSpacing:'0.12em', fontWeight:700, fontFamily:"'Azeret Mono', monospace", textTransform:'uppercase', color:'#8A827F', marginBottom:6 }}>Dashboard Variant</div>
          <div style={{ display:'flex', gap:4 }}>
            {variants.map(o=>(
              <button key={o.v} onClick={()=>setTweak('variant',o.v)} style={{
                flex:1, height:32, borderRadius:6, cursor:'pointer',
                background: tweaks.variant===o.v?'#C49A6C':'#F5F2F0', color:'#231F20',
                border:'1px solid #E9E3DF', fontWeight:600, fontSize:11,
              }}>{o.label}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:9, letterSpacing:'0.12em', fontWeight:700, fontFamily:"'Azeret Mono', monospace", textTransform:'uppercase', color:'#8A827F', marginBottom:6 }}>Density</div>
          <div style={{ display:'flex', gap:4 }}>
            {[['Compact','compact'],['Comfortable','comfortable']].map(([l,v])=>(
              <button key={v} onClick={()=>setTweak('density',v)} style={{
                flex:1, height:32, borderRadius:6, cursor:'pointer',
                background: tweaks.density===v?'#231F20':'#FFF', color: tweaks.density===v?'#FFF9F5':'#231F20',
                border:'1px solid #E9E3DF', fontWeight:600, fontSize:11,
              }}>{l}</button>
            ))}
          </div>
        </div>
        <div>
          <div style={{ fontSize:9, letterSpacing:'0.12em', fontWeight:700, fontFamily:"'Azeret Mono', monospace", textTransform:'uppercase', color:'#8A827F', marginBottom:6 }}>Hero Chart</div>
          <button onClick={()=>setTweak('showHero',!tweaks.showHero)} style={{
            width:'100%', height:32, borderRadius:6, cursor:'pointer',
            background: tweaks.showHero?'#2D7D6F':'#FFF', color: tweaks.showHero?'#FFF':'#231F20',
            border:'1px solid #E9E3DF', fontWeight:600, fontSize:11,
          }}>{tweaks.showHero?'Visible':'Hidden'}</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [tweaks, setTweaks] = useState(loadTweaks);
  const [nav, setNav] = useState(()=> localStorage.getItem('sl_nav') || 'home');
  const [editMode, setEditMode] = useState(false);

  useEffect(()=>{ localStorage.setItem('sl_nav', nav); }, [nav]);
  useEffect(()=>{ localStorage.setItem('sl_tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  const setTweak = (k,v) => {
    setTweaks(t=>{
      const next = {...t, [k]:v};
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
      return next;
    });
  };

  useEffect(()=>{
    const onMsg = (e)=>{
      if (!e.data || !e.data.type) return;
      if (e.data.type==='__activate_edit_mode') setEditMode(true);
      if (e.data.type==='__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=> window.removeEventListener('message', onMsg);
  }, []);

  const dark = tweaks.dark;
  const accent = tweaks.accent;

  // CSS var overrides for accent
  useEffect(()=>{
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.setAttribute('data-dark', String(dark));
  }, [accent, dark]);

  const titleByNav = {
    home:'DASHBOARD', finance:'HUB', calendar:'CASH FLOW', budget:'BUDGET', more:'MENU',
    invest:'PORTFOLIO', goals:'GOALS', debt:'PAYOFF', payments:'LOG', optimizer:'OPTIMIZER', settings:'SETTINGS',
  };

  const content = (() => {
    switch(nav){
      case 'home':      return <HomeDashboard variant={tweaks.variant} dark={dark} accent={accent} showHero={tweaks.showHero} density={tweaks.density}/>;
      case 'finance':   return <FinanceHub dark={dark} accent={accent}/>;
      case 'calendar':  return <CashFlowPage dark={dark} accent={accent}/>;
      case 'budget':    return <BudgetPage dark={dark} accent={accent}/>;
      case 'more':      return <MoreMenu dark={dark} onNav={setNav}/>;
      case 'invest':    return <InvestPage dark={dark} accent={accent}/>;
      case 'goals':     return <GoalsPage dark={dark} accent={accent}/>;
      case 'debt':      return <DebtPage dark={dark} accent={accent}/>;
      case 'payments':  return <PaymentsPage dark={dark} accent={accent}/>;
      case 'optimizer': return <OptimizerPage dark={dark} accent={accent}/>;
      case 'settings':  return <SettingsPage dark={dark} accent={accent} onToggleDark={()=>setTweak('dark',!dark)} onAccent={v=>setTweak('accent',v)}/>;
      default: return null;
    }
  })();

  const inMore = MORE_ITEMS.some(m=>m.id===nav);

  return (
    <div style={{
      minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      padding:'24px 12px',
    }}>
      <style>{`
        [data-screen-label] { scroll-margin-top: 0; }
      `}</style>
      <div data-screen-label={`01 ${titleByNav[nav]||nav}`}>
        <IOSDevice dark={dark} width={402} height={874}>
          <div style={{
            background:'var(--bg)', width:'100%', height:'100%',
            display:'flex', flexDirection:'column', position:'relative',
            color:'var(--fg-primary)',
            fontFamily:"'Inter', system-ui, sans-serif",
          }}>
            {/* Top bar */}
            <TopBar title={titleByNav[nav]} dark={dark} accent={accent} onMenu={()=>{}}/>

            {/* Back button when in "More" subpage */}
            {inMore && (
              <div style={{ padding:'0 20px 8px' }}>
                <button onClick={()=>setNav('more')} style={{
                  background:'transparent', border:0, cursor:'pointer', padding:0,
                  display:'inline-flex', alignItems:'center', gap:4,
                  color:accent, fontSize:12, fontWeight:600,
                }}>
                  <span className="mat" style={{ fontSize:16 }}>chevron_left</span> More
                </button>
              </div>
            )}

            {/* Scrollable content */}
            <div className="page-scroll" style={{
              flex:1, overflowY:'auto', overflowX:'hidden',
              paddingBottom: 110,
            }}>
              {content}
            </div>

            {/* FAB */}
            {nav==='home' && (
              <button style={{
                position:'absolute', right:16, bottom:100,
                width:52, height:52, borderRadius:'50%',
                background:'#231F20', color:'#FFF9F5',
                border:0, cursor:'pointer',
                boxShadow:'0 6px 20px rgba(0,0,0,0.25)',
                display:'flex', alignItems:'center', justifyContent:'center',
                zIndex:9,
              }}>
                <span className="mat" style={{ fontSize:24 }}>add</span>
              </button>
            )}

            {/* Tab bar */}
            <NavBar current={nav} onNav={setNav} dark={dark}/>
          </div>
        </IOSDevice>
      </div>

      {editMode && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={()=>setEditMode(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
